# Blueprint: https://render.com/docs/blueprint-spec
# With rootDir, dockerfilePath and dockerContext are relative to FoodBankHub/ — not the repo root.
# See: https://render.com/docs/monorepo-support#setting-a-root-directory
services:
  - type: web
    name: foodbankhub
    runtime: docker
    plan: free
    rootDir: FoodBankHub
    dockerfilePath: Dockerfile
    dockerContext: .
    healthCheckPath: /
    preDeployCommand: python manage.py migrate --noinput
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SITE_URL
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: foodbankhub-db
          property: connectionString

databases:
  - name: foodbankhub-db
    plan: free
    databaseName: foodbankhub
    user: foodbankhub
