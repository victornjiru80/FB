# Blueprint: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: foodbankhub
    runtime: docker
    plan: free
    dockerfilePath: ./FoodBankHub/Dockerfile
    dockerContext: ./FoodBankHub
    healthCheckPath: /
    preDeployCommand: python manage.py migrate --noinput
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SITE_URL
        sync: false
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: DATABASE_URL
        fromDatabase:
          name: foodbankhub-db
          property: connectionString

databases:
  - name: foodbankhub-db
    plan: free
    databaseName: foodbankhub
    user: foodbankhub
