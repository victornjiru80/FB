{% extends 'base.html' %}
{% block title %}Password Reset Sent - FoodBank Hub{% endblock %}
{% block extra_css %}
<style>
    /* Match login page minimalist auth styles */
    .main-content { padding-top: 30px; }
    .split-container { display: flex; background: #fff; }
    .form-section { flex: 1 1 auto; display: flex; align-items: center; justify-content: center; padding: 1.5rem; background: #fff; }
    .form-container { max-width: 500px; width: 100%; }
    .form-header { text-align: center; margin-bottom: 2rem; }
    .form-title { font-size: 1.75rem; font-weight: 700; color: #212529; margin-bottom: 0.5rem; text-align: center; }
    .btn { width: 100%; padding: 0.75rem; border: none; border-radius: 0.5rem; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s ease; text-decoration: none; text-align: center; display: inline-block; margin-bottom: 0.75rem; }
    .btn-primary { background: #28a745; color: #fff; }
    .btn-primary:hover { background: #218838; transform: translateY(-1px); box-shadow: 0 4px 8px rgba(40,167,69,.3); }
    .subtitle { color: #6c757d; text-align: center; }
    @media (max-width: 992px) { .split-container { flex-direction: column; } .form-section { flex: none; padding: 1rem; } }
    @media (max-width: 576px) { .form-section { padding: 1.5rem 1rem; } .form-title { font-size: 1.5rem; } }
</style>
{% endblock %}
{% block content %}
<div class="split-container">
    <div class="form-section">
        <div class="form-container">
            <div class="form-header">
                <h1 class="form-title">Check your email</h1>
                <p class="subtitle">If an account exists for the email you entered, you will receive a password reset link shortly.</p>
            </div>
            <a href="{% url 'login' %}" class="btn btn-primary">
                <i class="fas fa-arrow-left me-2"></i>Back to login
            </a>
        </div>
    </div>
</div>
{% endblock %}
