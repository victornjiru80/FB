{% extends 'base.html' %}
{% load static %}

{% block title %}Page Not Found - FoodBank Hub{% endblock %}

{% block extra_css %}
<style>
    .error-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #ffc107 0%, #fd7e14 100%);
        margin-top: -20px;
    }

    .error-card {
        background: white;
        border-radius: 20px;
        padding: 3rem;
        text-align: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        max-width: 500px;
        width: 90%;
        margin: 2rem;
    }

    .error-icon {
        font-size: 4rem;
        color: #ffc107;
        margin-bottom: 1.5rem;
    }

    .error-title {
        font-size: 2rem;
        font-weight: 700;
        color: #212529;
        margin-bottom: 1rem;
    }

    .error-message {
        font-size: 1.1rem;
        color: #6c757d;
        margin-bottom: 2rem;
        line-height: 1.6;
    }

    .action-buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
    }

    .btn-action {
        padding: 0.75rem 2rem;
        border-radius: 50px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
    }

    .btn-primary-action {
        background: linear-gradient(135deg, #28a745, #20c997);
        color: white;
        border: none;
    }

    .btn-primary-action:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        color: white;
    }

    .btn-secondary-action {
        background: #6c757d;
        color: white;
        border: none;
    }

    .btn-secondary-action:hover {
        background: #5a6268;
        transform: translateY(-2px);
        color: white;
    }

    @media (max-width: 576px) {
        .action-buttons {
            flex-direction: column;
        }
        
        .btn-action {
            width: 100%;
            justify-content: center;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-card">
        <div class="error-icon">
            <i class="fas fa-search"></i>
        </div>
        
        <h1 class="error-title">Page Not Found</h1>
        
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved. Let's get you back on track!
        </p>

        <div class="action-buttons">
            <a href="{% url 'home' %}" class="btn-action btn-primary-action">
                <i class="fas fa-home"></i>
                Go Home
            </a>
            
            <button onclick="window.history.back()" class="btn-action btn-secondary-action">
                <i class="fas fa-arrow-left"></i>
                Go Back
            </button>
        </div>
    </div>
</div>
{% endblock %}
