{% extends 'custom_admin/base.html' %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 mb-0">
            <i class="fas fa-times-circle text-danger me-2"></i>
            Reject Testimonial
        </h2>
        <a href="{% url 'custom_admin:testimonials_category_status' category 'pending' %}" class="btn btn-outline-secondary">
            <i class="fas fa-arrow-left me-1"></i>Back
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <div class="mb-3">
                <label class="form-label">Testimonial</label>
                <div class="border rounded p-3 bg-light">{{ testimonial.message }}</div>
            </div>

            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="rejection_reason" class="form-label">Rejection reason</label>
                    <textarea class="form-control" id="rejection_reason" name="rejection_reason" rows="4" required></textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-danger">
                        <i class="fas fa-times me-1"></i>Reject
                    </button>
                    <a href="{% url 'custom_admin:testimonials_category_status' category 'pending' %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
